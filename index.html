    <!-- Early theme detection: runs synchronously before paint to prevent flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('tgpcop-theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.add(t);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
